<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>偷看小秦｜明暗交界·UTOPIA</title>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
body{
  min-height: 100vh;
  color: #e2e2e2;
  background: #000000;
  background-image: 
    radial-gradient(ellipse at 80% 40%, rgba(130, 10, 20, 0.35) 0%, transparent 45%),
    radial-gradient(ellipse at 20% 70%, rgba(80, 5, 12, 0.2) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 20%, rgba(60, 0, 8, 0.18) 0%, transparent 35%);
  padding: 44px 16px calc(30px + env(safe-area-inset-bottom));
}
.wrap{
  max-width: 420px;
  margin: 0 auto;
}
.back-btn{
  color: #d84048;
  margin-bottom: 20px;
  display: inline-block;
  font-size: 14px;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.2s;
}
.back-btn:active{
  opacity: 0.6;
}
.title-box{
  text-align: center;
  margin-bottom: 30px;
}
.title-box h1{
  font-size: 22px;
  color: #f0dede;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.title-box p{
  font-size: 12px;
  color: #996b6b;
}
.block{
  background: rgba(12, 12, 14, 0.75);
  border: 1px solid rgba(90, 15, 25, 0.4);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}
.block h2{
  font-size:16px;
  color:#f2d9db;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}
/* 状态信息行 */
.state-row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(90,15,25,0.2);
  font-size:14px;
  color:#b87c82;
}
.state-row:last-child{
  border-bottom:none;
}
/* 偷看按钮 */
.peek-btn{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:none;
  background:#3f0b0e;
  color:#fff;
  font-size:14px;
  margin-top:16px;
  cursor:pointer;
}
.peek-btn:active{
  opacity:0.8;
}
.peek-btn:disabled{
  background:#441010;
  color:#886060;
  cursor:not-allowed;
}
.tip-text{
  margin-top:12px;
  font-size:12px;
  color:#704448;
  text-align:center;
  line-height:1.7;
}
/* 彩蛋提示 */
.egg-tip{
  margin-top:14px;
  padding:10px;
  background:rgba(180,25,45,0.2);
  border-radius:10px;
  font-size:13px;
  color:#f0dede;
  text-align:center;
  display:none;
}
.footer-tip{
  text-align:center;
  margin-top:40px;
  font-size:11px;
  color:#704448;
}
/* 擦雾容器 层级划分：底层内容→中层雾画布→顶层提示文字 */
.fog-container{
  position: relative;
  width: 100%;
  height: 320px;
  overflow: hidden;
  border-radius:14px;
  margin-bottom:16px;
}
.fog-content{
  position: absolute;
  z-index: 1;
  width: 100%;
  height: 100%;
  padding:20px;
}
.fog-mask{
  position: absolute;
  z-index: 2;
  left:0;top:0;
  width:100%;height:100%;
  touch-action: none;
}
.clear-hint{
  position:absolute;
  z-index: 3;
  left:0;top:0;
  width:100%;height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#222;
  font-size:14px;
  pointer-events:none;
  font-weight:500;
}
</style>
</head>
<body>
<div class="wrap">
  <!-- 修改：移除href，用JS返回首页index.html -->
  <div class="back-btn" id="backMain">← 返回首页</div>
  <div class="title-box">
    <h1>偷看小秦</h1>
    <p>小秦小秦，在干嘛呀｜20分钟仅可偷看一次</p >
  </div>
  <div class="block">
    <h2>👁 秦彻实时状态</h2>
    <!-- 擦雾互动区域 三层层级 -->
    <div class="fog-container">
      <!-- 底层文字内容 -->
      <div class="fog-content" id="stateBox">
        <div class="state-row"><span>当前状态</span><span>点击下方按钮生成画面，才能滑动擦掉白雾查看</span></div>
      </div>
      <!-- 中层浓雾画布（完全不透底色） -->
      <canvas class="fog-mask" id="fogCanvas"></canvas>
      <!-- 顶层提示文字 -->
      <div class="clear-hint" id="hintText">先点击偷看，再滑动擦掉雾气</div>
    </div>
    <div class="egg-tip" id="eggBox"></div>
    <button class="peek-btn" id="peekBtn">偷看秦彻</button>
    <div class="tip-text">每日零点清空偷看记录，距离下次偷看：<span id="countText">00:00</span></div>
  </div>
  <div class="footer-tip">
    全部本地存储，7天自动清除所有记录
  </div>
</div>
<script>
// 返回首页逻辑（核心修复）
const backBtn = document.getElementById('backMain');
backBtn.addEventListener('click', function() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = 'index.html';
  }
});

const STORAGE_KEY = "watchQinData";
// 1.地点库（逻辑统一，公私场景全覆盖）
const placeList = [
  "极乐之境酒馆",
  "奇异工坊观测台",
  "Solon酒店天台",
  "Solon酒店卧室",
  "卡戎集市后街·拍卖会场",
  "N109荒原观测点",
  "临空高架公路",
  "废弃旧实验楼·地下酒窖",
  "酒馆后门小巷",
  "工坊地下通道",
  "集市外围休息区",
  "斗兽场外围护栏旁",
  "暗点废弃哨点",
  "私人别墅卧室",
  "私人别墅书房",
  "私人别墅岛台",
  "私人地下酒窖",
  "私人健身房",
  "私人飞机机舱",
  "私人海岛度假卧室"
];
// 2.基础行为库25条
const actionList = [
  "擦拭随身枪械，指尖轻轻摩挲枪身纹路",
  "靠着栏杆安静看夜空，一言不发",
  "小口抿低度甜酒，想到狸勾唇低笑",
  "整理身上磨损的作战外套",
  "坐在台阶上翻看收集的芯核碎片",
  "喂流浪猫ing 其中一只小黑想吃却不敢向前",
  "独自散步，踢开路边碎石",
  "调试工坊借来的简易观测仪器",
  "闭目靠着椅子放松脖颈，短暂休憩",
  "记录纸上零散的情报线索",
  "安静听酒馆播放的老歌",
  "望着远方发呆，想起一些旧事",
  "简单处理手臂细微擦伤",
  "给梅菲斯特做全身保养",
  "翻看三年前斗兽游戏旧简报",
  "倚靠车顶吹晚风",
  "拆解废弃流浪体零部件研究",
  "沉默望着窗外流动的人群",
  "提笔写信给你",
  "坐在角落观察来往路人",
  "前往拍卖会",
  "靠在观测台望远镜旁看二薛打闹",
  "和暗点探子简单对接情报",
  "清理身上沾染的尘土与碎屑",
  "独自放空"
];
// 3.新增作息配套行为
const newActionAdd = [
  "吃白人饭，打算下次邀请你吃白人猫饭",
  "沉沉入睡，陷入安稳睡眠",
  "独自发呆想你",
  "随口哼唱喜欢的旋律，小声唱歌",
  "前往洗漱区安静如厕"
];
// 4.高概率私密专属台词（权重最高）
const highWeightSecretList = [
  "在卧室里，想你，🦌🦌🦌",
  "在地下酒窖里，品酒",
  "在临空街道，准备接你下班",
  "在N109的HW，开粉黑大魔王驰骋",
  "在私人健身房，练习拳击中",
  "在私人健身房，保持1097295中",
  "在私人健身房，增强小狸花美食中",
  "在私人飞机上，听黑胶唱片",
  "在拍卖会，物色你的新OOTD",
  "在谈判中，分神思考下次温泉地点",
  "在书房，看旅游杂志",
  "在家里，看动物大世界",
  "在床上，翻相册看你照片",
  "在岛台，翻你朋友圈"
];
// 5.低概率温柔偶遇彩蛋
const eggList = [
  "悄悄瞥见他口袋里露出一张你的小画像边角",
  "似乎刚刚和小梅提起你的名字，语气格外柔和",
  "梅菲斯特落在他肩头，叽叽喳喳嘎嘎嘎说着关于你的事",
  "他无意识停顿，目光望向你所在城市的方向",
  "桌上放着一份特意留存、和你相关的暗点情报",
  "低声轻念了一句你的名字，只有风声听见"
];
// 6.新版标准天气预报天气，分时段隔离（无红月/星云，纯现实气象）
// 凌晨 0:00 ~ 4:59 仅夜间低温气象
const dawnWeather = ["小雨","阴天","多云","雾天","阴转小雨","零星阵雨"];
// 白天 5:00 ~ 18:59 包含晴天、晚霞、高温
const dayWeather = ["晴天","多云","阴天","小雨","雷阵雨","晴转多云","傍晚晚霞","微风"];
// 夜晚 19:00 ~ 23:59 夜间气象，剔除晚霞烈日
const nightWeather = ["阴天","多云","小雨","雾天","零星阵雨","微风","阴转多云"];
// 温度固定区间15~35℃
const tempList = ["15℃","18℃","21℃","24℃","27℃","30℃","33℃","35℃","20℃","26℃","32℃"];
// 湿度库
const humidityList = ["32%","45%","58%","66%","72%","28%","40%","78%","62%"];
// 分贝库【已删除所有括号备注，仅纯数字；分昼夜合理区间，夜间不会出现高分贝】
const dayDbList = ["22","36","48","55","62","29"];
const nightDbList = ["18","22","29","36"];
// 饥饿值
const hungerList = ["饱腹","轻微饥饿","刚好合适","有点饿","饥肠辘辘","半饱"];
// ====================== 雾气画布全局变量 ======================
const fogCanvas = document.getElementById("fogCanvas");
const fogCtx = fogCanvas.getContext("2d");
let canWipe = false; // 未偷看禁止擦雾开关
let totalEraseArea = 0; // 累计擦除面积，达到50%自动清空
let canvasTotalArea = 0;
function resizeCanvas(){
  const container = document.querySelector(".fog-container");
  fogCanvas.width = container.offsetWidth;
  fogCanvas.height = container.offsetHeight;
  canvasTotalArea = fogCanvas.width * fogCanvas.height;
  // 纯白色完全不透雾层
  fogCtx.fillStyle = "#e0e0e6";
  fogCtx.fillRect(0,0,fogCanvas.width,fogCanvas.height);
  totalEraseArea = 0;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);
// 擦除雾气逻辑
let isTouch = false;
let lastX=0,lastY=0;
function wipeLine(x,y){
  if(!canWipe) return;
  fogCtx.globalCompositeOperation = "destination-out";
  fogCtx.lineCap = "round";
  fogCtx.lineWidth = 45;
  fogCtx.beginPath();
  fogCtx.moveTo(lastX,lastY);
  fogCtx.lineTo(x,y);
  fogCtx.stroke();
  const singleWipeArea = Math.PI * (45/2) * (45/2);
  totalEraseArea += singleWipeArea;
  if(totalEraseArea / canvasTotalArea >= 0.5){
    fogCtx.clearRect(0,0,fogCanvas.width,fogCanvas.height);
  }
}
// 触摸/鼠标事件
fogCanvas.addEventListener("touchstart",e=>{
  if(!canWipe) return;
  isTouch = true;
  const t = e.touches[0];
  const rect = fogCanvas.getBoundingClientRect();
  lastX = t.clientX - rect.left;
  lastY = t.clientY - rect.top;
});
fogCanvas.addEventListener("touchmove",e=>{
  if(!canWipe || !isTouch) return;
  e.preventDefault();
  const t = e.touches[0];
  const rect = fogCanvas.getBoundingClientRect();
  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;
  wipeLine(x,y);
  lastX = x; lastY = y;
  document.getElementById("hintText").style.opacity = "0";
});
fogCanvas.addEventListener("touchend",()=>isTouch=false);
fogCanvas.addEventListener("mousedown",e=>{
  if(!canWipe) return;
  isTouch=true;
  const rect = fogCanvas.getBoundingClientRect();
  lastX = e.offsetX; lastY = e.offsetY;
});
fogCanvas.addEventListener("mousemove",e=>{
  if(!canWipe || !isTouch) return;
  wipeLine(e.offsetX,e.offsetY);
  document.getElementById("hintText").style.opacity = "0";
  lastX = e.offsetX; lastY = e.offsetY;
});
fogCanvas.addEventListener("mouseup",()=>isTouch=false);
// ====================== 本地存储逻辑 ======================
function getStorage(){
  let raw = localStorage.getItem(STORAGE_KEY);
  const today = new Date().toLocaleDateString();
  const defaultData = {
    createTime: Date.now(),
    date: today,
    lastPeekTime: 0,
    lastState: null
  };
  if(!raw) return defaultData;
  const data = JSON.parse(raw);
  if(data.date !== today) return defaultData;
  return data;
}
function saveStorage(obj){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
}
// 7天全局自动清空缓存
function checkTotalClear(){
  const data = getStorage();
  const sevenDay = 7 * 24 * 60 * 60 * 1000;
  if(Date.now() - data.createTime > sevenDay){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}
checkTotalClear();
// 随机抽取数组内一项
function randomPick(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}
// 生成完整状态：分时段匹配天气、分贝，解决逻辑矛盾
function generateState(){
  const hour = new Date().getHours();
  let currentWeather, currentDb;
  // 分时段匹配天气、合理分贝
  if(hour >= 0 && hour < 5){
    // 凌晨0-4点：凌晨气象+夜间低分贝
    currentWeather = randomPick(dawnWeather);
    currentDb = randomPick(nightDbList);
  }else if(hour >=5 && hour <19){
    // 白天5-18点：白天气象+白天区间分贝
    currentWeather = randomPick(dayWeather);
    currentDb = randomPick(dayDbList);
  }else{
    // 夜晚19-23点：夜间气象+夜间低分贝
    currentWeather = randomPick(nightWeather);
    currentDb = randomPick(nightDbList);
  }
  return {
    place: randomPick(placeList),
    weather: currentWeather,
    temp: randomPick(tempList),
    humidity: randomPick(humidityList),
    db: currentDb,
    hunger: randomPick(hungerList),
    hasEgg: Math.random() < 0.22,
    eggText: randomPick(eggList)
  }
}
// 加权抽取行为（高概率同居私密台词）
function pickWeightAction(){
  let pool = [];
  highWeightSecretList.forEach(item=>pool.push({text:item,weight:8}));
  actionList.forEach(item=>pool.push({text:item,weight:3}));
  newActionAdd.forEach(item=>pool.push({text:item,weight:3}));
  let totalW = 0;
  pool.forEach(i=>totalW += i.weight);
  let rand = Math.floor(Math.random()*totalW);
  let cur=0;
  for(let p of pool){
    cur += p.weight;
    if(rand < cur) return p.text;
  }
  return "安静发呆";
}
// 渲染面板
const stateBox = document.getElementById("stateBox");
const eggBox = document.getElementById("eggBox");
function renderState(stateData){
  if(!stateData){
    stateBox.innerHTML = `<div class="state-row"><span>当前状态</span><span>暂未偷看，点击下方按钮查看</span></div>`;
    eggBox.style.display = "none";
    canWipe = false;
    return;
  }
  let fullAct = pickWeightAction();
  let realPlace, realAct;
  if(fullAct.includes("在")){
    const splitIndex = fullAct.indexOf("，");
    realPlace = fullAct.slice(0,splitIndex);
    realAct = fullAct.slice(splitIndex+1);
  }else{
    realPlace = stateData.place;
    realAct = fullAct;
  }
  stateBox.innerHTML = `
    <div class="state-row"><span>📍 所处地点</span><span>${realPlace}</span></div>
    <div class="state-row"><span>🗣 正在做什么</span><span>${realAct}</span></div>
    <div class="state-row"><span>🍽 饥饿值</span><span>${stateData.hunger}</span></div>
    <div class="state-row"><span>🔊 环境分贝</span><span>${stateData.db}</span></div>
    <div class="state-row"><span>🌤 天气</span><span>${stateData.weather}</span></div>
    <div class="state-row"><span>🌡 温度</span><span>${stateData.temp}</span></div>
    <div class="state-row"><span>💧 湿度</span><span>${stateData.humidity}</span></div>
  `;
  if(stateData.hasEgg){
    eggBox.innerText = "✨隐秘偶遇：" + stateData.eggText;
    eggBox.style.display = "block";
  }else{
    eggBox.style.display = "none";
  }
}
// 20分钟偷看冷却倒计时
const COOL_TIME = 20 * 60 * 1000;
const peekBtn = document.getElementById("peekBtn");
const countText = document.getElementById("countText");
function refreshCountdown(){
  const data = getStorage();
  const diff = COOL_TIME - (Date.now() - data.lastPeekTime);
  if(diff <= 0){
    countText.innerText = "00:00";
    peekBtn.disabled = false;
  }else{
    peekBtn.disabled = true;
    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    countText.innerText = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }
}
refreshCountdown();
setInterval(refreshCountdown, 1000);
// 偷看按钮点击
peekBtn.onclick = function(){
  const data = getStorage();
  const now = Date.now();
  if(now - data.lastPeekTime < COOL_TIME){
    alert("还没到偷看冷却时间，耐心等等小秦吧");
    return;
  }
  const newState = generateState();
  data.lastState = newState;
  data.lastPeekTime = now;
  saveStorage(data);
  renderState(newState);
  refreshCountdown();
  // 解锁擦雾，重置完整浓雾
  canWipe = true;
  totalEraseArea = 0;
  fogCtx.globalCompositeOperation = "source-over";
  fogCtx.fillStyle = "#e0e0e6";
  fogCtx.fillRect(0,0,fogCanvas.width,fogCanvas.height);
  document.getElementById("hintText").style.opacity = "1";
}
// 页面初始化
function initPage(){
  const data = getStorage();
  renderState(data.lastState);
  refreshCountdown();
  canWipe = false;
}
initPage();
</script>
</body>
</html>
